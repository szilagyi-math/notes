name: Manage GH-Pages branch

permissions:
  contents: write

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get cache directories
        id: cache-dirs
        run: |
          echo "PNPM=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.cache-dirs.outputs.PNPM }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup next cache
        uses: actions/cache@v3
        with:
          path: .next
          key: ${{ runner.os }}-next-${{ hashFiles('src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Setup velite cache
        uses: actions/cache@v3
        with:
          path: .velite
          key:
            ${{ runner.os }}-velite-${{ hashFiles('content/**/index.md',
            'velite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-velite-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm velite && pnpm build && touch ./out/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: out
